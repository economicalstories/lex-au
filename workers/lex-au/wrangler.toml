name = "lex-au"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[vectorize]]
binding = "LEGISLATION_INDEX"
index_name = "au-legislation"

[[vectorize]]
binding = "LEGISLATION_SECTION_INDEX"
index_name = "au-legislation-section"

# Workers AI binding must be a single table (`[ai]`), not an array (`[[ai]]`)
# and must not also be declared as an inline table at the top of the file.
[ai]
binding = "AI"
