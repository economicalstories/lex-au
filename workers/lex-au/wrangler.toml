name = "lex-au"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[vectorize]]
binding = "LEGISLATION_INDEX"
index_name = "au-legislation"

[[vectorize]]
binding = "LEGISLATION_SECTION_INDEX"
index_name = "au-legislation-section"

# Workers AI binding must be a single table (`[ai]`), not an array (`[[ai]]`).
# Using `[[ai]]` causes Wrangler TOML parse errors: "trying to redefine an already defined table or value".
[ai]
binding = "AI"

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
# Replace with your real Cloudflare Rate Limiting namespace ID if different.
namespace_id = "1001"
simple = { limit = 100, period = 60 }
